# CareerMind AI — Render Deployment

services:
  - type: web
    name: careermind-api
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_SHEET_ID
        value: 1pYZcY9DIyQFTJ5lxS_G50Dmcf6GoU3vTyFEDSfltwyc
      - key: GOOGLE_SHEETS_CREDS_JSON
        value: ""
      - key: RESEND_API_KEY
        value: ""